version: "3.8"

services:
  api:
    build: .
    container_name: betalent_api
    ports:
      - "3333:3333"
    volumes:
      - .:/app
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql
      - DB_USER=betalent
      - DB_PASSWORD=betalent
      - DB_DATABASE=betalent
      - GATEWAY_1_URL=http://gateways:3001
      - GATEWAY_2_URL=http://gateways:3002
    command: npm run dev

  mysql:
    image: mysql:8
    container_name: betalent_mysql
    restart: always
    environment:
      MYSQL_DATABASE: betalent
      MYSQL_USER: betalent
      MYSQL_PASSWORD: betalent
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: betalent_gateways
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  mysql_data:
